services:
  - type: web
    name: forge
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: forge
      - key: HEVY_API_KEY
        sync: false
      - key: OURA_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
